services:
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: db_auth
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: db_auth
      MYSQL_USER: ${DB_USERNAME:?DB_USERNAME required}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD required}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
